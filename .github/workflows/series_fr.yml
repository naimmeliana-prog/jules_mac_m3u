name: Update Series FR M3U

on:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run M3U Generator
      run: python m3u_generator.py --type series --lang fr

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add series_fr.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Series FR M3U playlist" && git push)
